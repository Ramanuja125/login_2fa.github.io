<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Check Your Email — Secure Portal</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <div class="card">
    <div class="card-header">
      <div class="logo">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
          <polyline points="22,6 12,13 2,6"/>
        </svg>
      </div>
      <h1>Check Your Email</h1>
      <p>We sent a secure sign-in link to your inbox</p>
    </div>

    <div style="text-align:center; padding: 10px 0 20px;">
      <p style="font-size:0.9rem; color:var(--text-muted); line-height:1.7;">
        Click the link in the email to complete your login.<br/>
        The link expires in <strong>10 minutes</strong>.
      </p>
    </div>

    <div id="alert-error" class="alert alert-error" role="alert"></div>

    <div class="footer-link">
      <a href="index.html">← Back to Sign In</a>
    </div>
  </div>

  <p class="hipaa-notice">
    <span>🔒 HIPAA Compliant</span><br/>
    Two-factor authentication is required for HIPAA compliance.
  </p>

</body>
</html>
