<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Access Granted — Secure Portal</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <div class="card">
    <div class="card-header">
      <!-- Animated checkmark -->
      <div class="success-icon">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
      </div>
      <h1>Login Successful</h1>
      <p>You are now securely authenticated</p>
    </div>

    <!-- User info badge -->
    <div class="user-badge" id="user-badge">
      Welcome back, <strong id="user-name">User</strong><br/>
      <span id="user-email" style="font-weight:400; font-size:0.8rem; opacity:0.8;"></span>
    </div>

    <p style="font-size:0.875rem; color:var(--text-muted); text-align:center; margin-bottom:20px;">
      You have been granted access to the secure portal.<br/>
      Your session is active and encrypted.
    </p>

    <button class="btn btn-outline" id="logout-btn">Sign Out</button>
  </div>

  <p class="hipaa-notice">
    <span>🔒 HIPAA Compliant</span><br/>
    Always sign out when you are done. Do not share your credentials.
  </p>

  <script src="auth.js"></script>
  <script>
    // Guard: redirect if not authenticated
    requireAuth();

    // Display logged-in user
    const user = getSessionUser();
    if (user) {
      document.getElementById("user-name").textContent  = user.name  || "User";
      document.getElementById("user-email").textContent = user.email || "";
    }

    document.getElementById("logout-btn").addEventListener("click", () => {
      onLogout();
    });
  </script>
</body>
</html>
