<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Access Granted — Secure Portal</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <div class="card" id="loading-card">
    <div class="card-header">
      <p style="color:var(--text-muted);">Verifying your session…</p>
    </div>
  </div>

  <div class="card" id="success-card" style="display:none;">
    <div class="card-header">
      <div class="success-icon">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
      </div>
      <h1>Login Successful</h1>
      <p>You are now securely authenticated</p>
    </div>

    <div class="user-badge">
      Welcome, <strong id="user-name">User</strong><br/>
      <span id="user-email" style="font-weight:400; font-size:0.8rem; opacity:0.8;"></span>
    </div>

    <p style="font-size:0.875rem; color:var(--text-muted); text-align:center; margin-bottom:20px;">
      Your session is active and encrypted.
    </p>

    <button class="btn btn-outline" onclick="signOut()">Sign Out</button>
  </div>

  <div class="card" id="error-card" style="display:none;">
    <div class="card-header">
      <h1 style="color:var(--danger);">Access Denied</h1>
      <p>The sign-in link is invalid or has expired.</p>
    </div>
    <a href="index.html" class="btn btn-primary" style="text-decoration:none; text-align:center; display:block; padding:11px;">
      Back to Sign In
    </a>
  </div>

  <p class="hipaa-notice">
    <span>🔒 HIPAA Compliant</span><br/>
    Always sign out when you are done. Do not share your credentials.
  </p>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="auth.js"></script>
  <script>
    (async () => {
      try {
        const user = await completeEmailLinkSignIn();

        document.getElementById("loading-card").style.display = "none";

        if (user) {
          document.getElementById("user-name").textContent  = user.name;
          document.getElementById("user-email").textContent = user.email;
          document.getElementById("success-card").style.display = "block";
          // Clean up the email link from the URL
          window.history.replaceState({}, document.title, window.location.pathname);
        } else {
          // No email link — check if already logged in via session
          const session = getSessionUser();
          if (session) {
            document.getElementById("user-name").textContent  = session.name;
            document.getElementById("user-email").textContent = session.email;
            document.getElementById("success-card").style.display = "block";
          } else {
            window.location.href = "index.html";
          }
        }
      } catch (err) {
        console.error(err);
        document.getElementById("loading-card").style.display = "none";
        document.getElementById("error-card").style.display   = "block";
      }
    })();
  </script>
</body>
</html>
