<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — Secure Portal</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <div class="card">
    <div class="card-header">
      <div class="logo">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M19 11H5a2 2 0 00-2 2v7a2 2 0 002 2h14a2 2 0 002-2v-7a2 2 0 00-2-2zM7 11V7a5 5 0 0110 0v4"/>
        </svg>
      </div>
      <h1>Sign In</h1>
      <p>Access your secure portal</p>
    </div>

    <div id="alert-error" class="alert alert-error" role="alert"></div>

    <button class="btn btn-primary" id="login-btn" onclick="handleSignIn()">
      Sign In with Microsoft
    </button>

    <div class="footer-link" style="margin-top: 16px;">
      Don't have an account? <a href="register.html">Register</a>
    </div>
  </div>

  <p class="hipaa-notice">
    <span>🔒 HIPAA Compliant</span><br/>
    This system is protected under federal privacy regulations.<br/>
    Unauthorized access is strictly prohibited.
  </p>

  <!-- Microsoft Authentication Library -->
  <script src="https://alcdn.msauth.net/browser/2.38.0/js/msal-browser.min.js"></script>
  <script src="auth.js"></script>
  <script>
    async function handleSignIn() {
      const btn = document.getElementById("login-btn");
      btn.disabled = true;
      btn.textContent = "Redirecting…";
      hideAlert("alert-error");

      try {
        await signIn();
        // Page will redirect to Microsoft login — no code runs after this
      } catch (err) {
        showAlert("alert-error", "Sign in failed. Please try again.");
        btn.disabled = false;
        btn.textContent = "Sign In with Microsoft";
      }
    }
  </script>
</body>
</html>
