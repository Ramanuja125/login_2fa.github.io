<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — Secure Portal</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <div class="card">
    <div class="card-header">
      <div class="logo">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M19 11H5a2 2 0 00-2 2v7a2 2 0 002 2h14a2 2 0 002-2v-7a2 2 0 00-2-2zM7 11V7a5 5 0 0110 0v4"/>
        </svg>
      </div>
      <h1>Sign In</h1>
      <p>Access your secure portal</p>
    </div>

    <div id="alert-error" class="alert alert-error" role="alert"></div>

    <form id="login-form" novalidate>
      <div class="form-group">
        <label for="email">Email address</label>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email" required />
        <span class="field-error"></span>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password" required />
        <span class="field-error"></span>
      </div>

      <button type="submit" class="btn btn-primary" id="login-btn">Sign In</button>
    </form>

    <div class="footer-link">
      <a href="forgot-password.html">Forgot password?</a>
    </div>

    <div class="footer-link">
      Don't have an account? <a href="register.html">Register</a>
    </div>
  </div>

  <p class="hipaa-notice">
    <span>🔒 HIPAA Compliant</span><br/>
    This system is protected under federal privacy regulations.
  </p>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="auth.js"></script>
  <script>
    const emailEl = document.getElementById("email");
    const pwdEl   = document.getElementById("password");

    emailEl.addEventListener("input", () => clearError(emailEl));
    pwdEl.addEventListener("input",   () => clearError(pwdEl));

    document.getElementById("login-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      hideAlert("alert-error");

      let valid = true;
      const email = emailEl.value.trim();
      const pwd   = pwdEl.value;

      if (!email) {
        showError(emailEl, "Email is required."); valid = false;
      } else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        showError(emailEl, "Enter a valid email address."); valid = false;
      }
      if (!pwd) {
        showError(pwdEl, "Password is required."); valid = false;
      }
      if (!valid) return;

      const btn = document.getElementById("login-btn");
      btn.disabled = true;
      btn.textContent = "Signing in…";

      try {
        await loginUser(email, pwd);
        window.location.href = "verify.html";
      } catch (err) {
        console.error("Login error:", err.code, err.message);
        let msg = "Incorrect email or password. Please try again.";
        if (err.code === "auth/too-many-requests")       msg = "Too many attempts. Please try again later.";
        if (err.code === "auth/user-not-found")          msg = "No account found with this email. Please register.";
        if (err.code === "auth/invalid-credential")      msg = "Incorrect email or password. Please try again.";
        if (err.code === "auth/wrong-password")          msg = "Incorrect password. Please try again.";
        if (err.code === "auth/unauthorized-continue-uri") msg = "Configuration error: domain not authorized in Firebase. Please contact support.";
        if (err.code === "auth/invalid-continue-uri")    msg = "Configuration error: invalid redirect URL.";
        if (err.code === "auth/missing-continue-uri")    msg = "Configuration error: missing redirect URL.";
        showAlert("alert-error", msg);
        btn.disabled = false;
        btn.textContent = "Sign In";
      }
    });
  </script>
</body>
</html>
