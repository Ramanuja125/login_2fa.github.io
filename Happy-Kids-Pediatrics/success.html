<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Access Granted — Happy Kids Pediatrics</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <div class="card">
    <div class="card-header">
      <div class="logo" style="margin-bottom:16px;">
        <img src="happy.jpg" alt="Happy Kids Pediatrics" />
      </div>
      <div class="success-icon">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
      </div>
      <h1>Login Successful</h1>
      <p>You are now securely authenticated</p>
    </div>

    <div class="user-badge">
      Welcome, <strong id="user-name">User</strong><br/>
      <span id="user-email" style="font-weight:400; font-size:0.8rem; opacity:0.8;"></span>
    </div>

    <p style="font-size:0.875rem; color:var(--text-muted); text-align:center; margin-bottom:20px;">
      Your session is active and encrypted.
    </p>

    <button class="btn btn-outline" onclick="signOut()">Sign Out</button>
  </div>

  <p class="hipaa-notice">
    <span>🔒 HIPAA Compliant</span><br/>
    Always sign out when you are done. Do not share your credentials.
    <br/>For any information please contact the Practice at 480-776-3790
  </p>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="auth.js"></script>
  <script>
    const user = getSessionUser();
    if (!user) {
      window.location.href = "index.html";
    } else {
      document.getElementById("user-name").textContent  = user.name;
      document.getElementById("user-email").textContent = user.email;
    }
  </script>
</body>
</html>
