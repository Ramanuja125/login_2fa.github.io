<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password — Happy Kids Pediatrics</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <div class="card">
    <div class="card-header">
      <div class="logo">
        <img src="happy.jpg" alt="Happy Kids Pediatrics" />
      </div>
      <h1>Reset Password</h1>
      <p>Enter your email and we'll send a reset link</p>
    </div>

    <div id="alert-error"   class="alert alert-error"   role="alert"></div>
    <div id="alert-success" class="alert alert-success" role="alert"></div>

    <form id="reset-form" novalidate>
      <div class="form-group">
        <label for="email">Email address</label>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email" required />
        <span class="field-error"></span>
      </div>

      <button type="submit" class="btn btn-primary" id="reset-btn">Send Reset Link</button>
    </form>

    <div class="footer-link">
      <a href="index.html">← Back to Sign In</a>
    </div>
  </div>

  <p class="hipaa-notice">
    <span>🔒 HIPAA Compliant</span><br/>
    This system is protected under federal privacy regulations.
    <br/>For any information please contact the Practice at 480-776-3790
  </p>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="auth.js"></script>
  <script>
    const emailEl = document.getElementById("email");
    emailEl.addEventListener("input", () => clearError(emailEl));

    document.getElementById("reset-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      hideAlert("alert-error");
      hideAlert("alert-success");

      const email = emailEl.value.trim();
      if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        showError(emailEl, "Enter a valid email address.");
        return;
      }

      const btn = document.getElementById("reset-btn");
      btn.disabled = true;
      btn.textContent = "Sending…";

      try {
        await getAuth().sendPasswordResetEmail(email);
        showAlert("alert-success", "Reset link sent! Check your inbox.");
        btn.textContent = "Link Sent";
      } catch (err) {
        let msg = "Failed to send reset email. Please try again.";
        if (err.code === "auth/user-not-found") msg = "No account found with this email.";
        if (err.code === "auth/too-many-requests") msg = "Too many attempts. Please try again later.";
        showAlert("alert-error", msg);
        btn.disabled = false;
        btn.textContent = "Send Reset Link";
      }
    });
  </script>
</body>
</html>
